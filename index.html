  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"3620fbd2-90d6-4a5b-a755-316f1399a255\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* ═══════════════════════════════════════════════════════════════════════════\n   SM BUSINESS SOLUTIONS · DESIGN SYSTEM\n   colors_and_type.css — foundational tokens (color + type) + semantic roles\n   ───────────────────────────────────────────────────────────────────────────\n   Brand: dark-cinematic glassmorphism for a B2B digital agency in Cali, CO.\n   Base #06080F · Plus Jakarta Sans · electric cyan #00F5FF · viva magenta #BB2649\n   Adapted from the Comando Software 2026 commercial deck (the reference SM ships).\n   Fonts self-host from fonts/ (variable TTFs) via the @font-face block below —\n   no CDN needed. Keep a fonts/ folder beside every copy of this stylesheet.\n   ═══════════════════════════════════════════════════════════════════════════ */\n\n/* ───────────────────────────────────────────────────────────────\n   SELF-HOSTED BRAND FONTS (variable TTFs in fonts/)\n   These replace the Google Fonts CDN delivery. Paths resolve relative\n   to THIS file — keep a fonts/ folder beside each copy of this stylesheet.\n   ─────────────────────────────────────────────────────────────── */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  src: url(\"dd393bff-b62f-4bdc-8ac0-a8f460df5311\") format('truetype-variations');\n  font-weight: 200 800; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  src: url(\"ad0559c1-89e2-4d10-b988-8013081208b0\") format('truetype-variations');\n  font-weight: 200 800; font-style: italic; font-display: swap;\n}\n@font-face {\n  font-family: 'JetBrains Mono';\n  src: url(\"4b5b8c09-54e7-4ed5-b4d4-3ee238289c04\") format('truetype-variations');\n  font-weight: 300 600; font-style: normal; font-display: swap;\n}\n@font-face {\n  font-family: 'JetBrains Mono';\n  src: url(\"921497f5-f84a-4e7a-a5a9-9ba5635063b4\") format('truetype-variations');\n  font-weight: 300 600; font-style: italic; font-display: swap;\n}\n\n:root {\n  /* ─────────────────────────────────────────────────────────────\n     1 · INK — cinematic dark base (near-black, slightly blue)\n     ───────────────────────────────────────────────────────────── */\n  --ink-0: #06080F;   /* page / stage base                       */\n  --ink-1: #0A0E18;   /* raised panel                            */\n  --ink-2: #0F1422;   /* card resting fill                       */\n  --ink-3: #161D2F;   /* hover fill / divider zone               */\n  --ink-4: #1F2940;   /* strongest neutral surface               */\n\n  /* ─────────────────────────────────────────────────────────────\n     2 · BRAND ACCENTS — two-color system\n        cyan  = digital / web / tech / \"system online\"\n        mag   = marketing / creative / \"human energy\"\n     ───────────────────────────────────────────────────────────── */\n  --cyan:        #00F5FF;   /* electric cyan — primary accent     */\n  --cyan-deep:   #06C2CC;   /* cyan for fills/text on light glass */\n  --cyan-soft:   #5DE0D6;   /* muted cyan (large fills, calmer)   */\n  --magenta:     #BB2649;   /* viva magenta — secondary accent    */\n  --magenta-lit: #E8456E;   /* brighter magenta for glow/hover    */\n  --magenta-soft:#F08491;   /* rose tint (warnings / problem)     */\n\n  /* accent tints — for halos, washes, hairline tints */\n  --cyan-12:    rgba(0, 245, 255, 0.12);\n  --cyan-22:    rgba(0, 245, 255, 0.22);\n  --cyan-40:    rgba(0, 245, 255, 0.40);\n  --mag-12:     rgba(187, 38, 73, 0.14);\n  --mag-22:     rgba(187, 38, 73, 0.24);\n  --mag-40:     rgba(232, 69, 110, 0.40);\n\n  /* ─────────────────────────────────────────────────────────────\n     3 · TEXT — white at descending opacity (never pure greys)\n     ───────────────────────────────────────────────────────────── */\n  --txt:       rgba(255, 255, 255, 0.96);  /* headings / primary   */\n  --txt-soft:  rgba(255, 255, 255, 0.78);  /* body / lead          */\n  --txt-mute:  rgba(255, 255, 255, 0.52);  /* secondary / captions */\n  --txt-dim:   rgba(255, 255, 255, 0.32);  /* labels / meta        */\n  --txt-faint: rgba(255, 255, 255, 0.18);  /* hairlines / rules    */\n  --txt-ink:   #0A0E18;                     /* text ON cyan buttons */\n\n  /* ─────────────────────────────────────────────────────────────\n     4 · GLASS — translucent surface system (glassmorphism)\n     ───────────────────────────────────────────────────────────── */\n  --glass-1:          rgba(255, 255, 255, 0.035);  /* faintest    */\n  --glass-2:          rgba(255, 255, 255, 0.06);   /* resting     */\n  --glass-3:          rgba(255, 255, 255, 0.085);  /* raised top  */\n  --glass-edge:       rgba(255, 255, 255, 0.10);   /* 1px border  */\n  --glass-edge-bright:rgba(255, 255, 255, 0.22);   /* lit edge    */\n  --glass-blur:       blur(24px) saturate(140%);\n\n  /* ─────────────────────────────────────────────────────────────\n     5 · SEMANTIC STATUS (used sparingly — mostly UI, not slides)\n     ───────────────────────────────────────────────────────────── */\n  --ok:    #5DE0D6;\n  --warn:  #E5B061;\n  --error: #F08491;\n  --info:  #6B8FFF;\n\n  /* ─────────────────────────────────────────────────────────────\n     6 · RADII\n     ───────────────────────────────────────────────────────────── */\n  --r-xs: 4px;\n  --r-sm: 8px;\n  --r-md: 14px;\n  --r-lg: 22px;\n  --r-xl: 32px;\n  --r-pill: 999px;\n\n  /* ─────────────────────────────────────────────────────────────\n     7 · SPACING — 4px base scale\n     ───────────────────────────────────────────────────────────── */\n  --s-1: 4px;   --s-2: 8px;   --s-3: 12px;  --s-4: 16px;\n  --s-5: 24px;  --s-6: 32px;  --s-7: 48px;  --s-8: 64px;\n  --s-9: 96px;  --s-10: 128px;\n\n  /* ─────────────────────────────────────────────────────────────\n     8 · ELEVATION / SHADOW\n        Dark UI → shadows are deep & soft; \"lift\" comes from glow.\n     ───────────────────────────────────────────────────────────── */\n  --shadow-sm:  0 2px 8px rgba(0,0,0,0.30);\n  --shadow-md:  0 12px 32px -8px rgba(0,0,0,0.55);\n  --shadow-lg:  0 28px 70px -18px rgba(0,0,0,0.70);\n  --glow-cyan:  0 0 24px rgba(0,245,255,0.45);\n  --glow-mag:   0 0 24px rgba(232,69,110,0.40);\n\n  /* ─────────────────────────────────────────────────────────────\n     9 · MOTION\n     ───────────────────────────────────────────────────────────── */\n  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);   /* signature ease */\n  --ease-io:  cubic-bezier(0.65, 0, 0.35, 1);\n  --dur-fast: 0.18s;\n  --dur:      0.30s;\n  --dur-slow: 0.65s;\n\n  /* ─────────────────────────────────────────────────────────────\n     10 · TYPE — families\n     ───────────────────────────────────────────────────────────── */\n  --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, \"Segoe UI\", sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', \"Roboto Mono\", monospace;\n\n  /* type scale (display uses ultralight 200 + bold-italic 700/800 pairing) */\n  --fs-display-xxl: 220px;\n  --fs-display-xl:  156px;\n  --fs-display-l:   104px;\n  --fs-h1: 72px;\n  --fs-h2: 48px;\n  --fs-h3: 32px;\n  --fs-h4: 23px;\n  --fs-lead: 22px;\n  --fs-body: 16px;\n  --fs-small: 14px;\n  --fs-mono: 12px;\n\n  --lh-tight: 0.92;\n  --lh-snug: 1.1;\n  --lh-body: 1.5;\n  --tk-display: -0.045em;  /* tight tracking on big display type */\n  --tk-mono: 0.16em;       /* wide tracking on mono labels       */\n}\n\n/* ═══════════════════════════════════════════════════════════════════════════\n   SEMANTIC TYPE ROLES — apply directly or copy into component CSS\n   ═══════════════════════════════════════════════════════════════════════════ */\n\n.sm-display-xxl,\n.sm-display-xl,\n.sm-display-l {\n  font-family: var(--font-sans);\n  font-weight: 200;\n  letter-spacing: var(--tk-display);\n  line-height: var(--lh-tight);\n  color: var(--txt);\n  text-wrap: pretty;\n}\n.sm-display-xxl { font-size: var(--fs-display-xxl); }\n.sm-display-xl  { font-size: var(--fs-display-xl); }\n.sm-display-l   { font-size: var(--fs-display-l); }\n\n/* the signature \"thin → strong-italic\" emphasis inside display type */\n.sm-display-xxl em, .sm-display-xl em, .sm-display-l em, .sm-em {\n  font-style: italic;\n  font-weight: 700;\n  letter-spacing: -0.045em;\n  color: var(--cyan);\n}\n\n.sm-h1 { font-family: var(--font-sans); font-weight: 700; font-size: var(--fs-h1);\n         line-height: var(--lh-snug); letter-spacing: -0.035em; color: var(--txt); }\n.sm-h2 { font-family: var(--font-sans); font-weight: 600; font-size: var(--fs-h2);\n         line-height: var(--lh-snug); letter-spacing: -0.03em;  color: var(--txt); }\n.sm-h3 { font-family: var(--font-sans); font-weight: 600; font-size: var(--fs-h3);\n         line-height: 1.05; letter-spacing: -0.025em; color: var(--txt); }\n.sm-h4 { font-family: var(--font-sans); font-weight: 600; font-size: var(--fs-h4);\n         line-height: 1.1;  letter-spacing: -0.02em;  color: var(--txt); }\n\n.sm-lead { font-family: var(--font-sans); font-weight: 400; font-size: var(--fs-lead);\n           line-height: 1.45; letter-spacing: -0.01em; color: var(--txt-soft); max-width: 540px; }\n\n.sm-body { font-family: var(--font-sans); font-weight: 400; font-size: var(--fs-body);\n           line-height: var(--lh-body); color: var(--txt-soft); }\n\n.sm-small { font-size: var(--fs-small); line-height: 1.5; color: var(--txt-mute); }\n\n/* mono label — the connective tissue of the whole system */\n.sm-mono { font-family: var(--font-mono); font-weight: 400; font-size: var(--fs-mono);\n           letter-spacing: var(--tk-mono); text-transform: uppercase; color: var(--txt-mute); }\n\n/* accent text helpers */\n.sm-accent-cyan { color: var(--cyan); }\n.sm-accent-mag  { color: var(--magenta-lit); }\n<\u002Fstyle>\n  <style>/* ═══════════════════════════════════════════════════════════════\n   SM BUSIN
